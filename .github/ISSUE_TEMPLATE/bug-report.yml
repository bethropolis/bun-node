name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.
  - type: input
    id: bun-version
    attributes:
      label: Bun version
      description: Output of `bun --version`
      placeholder: "e.g. 1.3.13"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      description: OS and version
      placeholder: "e.g. macOS 15.4, Ubuntu 24.04, Windows 11 (WSL2)"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen.
      placeholder: "npm install -D foo failed with..."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `npm install -D typescript`
        2. See error
    validations:
      required: true
  - type: textarea
    id: debug-output
    attributes:
      label: Debug output
      description: Run with `BUN_NODE_DEBUG=1` and paste the output.
      render: shell
    validations:
      required: false
